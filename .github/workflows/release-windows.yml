name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v2.17.5)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build Windows artifact and publish release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is empty"
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v'"
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Ensure Yarn node-modules linker
        shell: bash
        run: |
          if [ ! -f .yarnrc.yml ]; then
            printf "nodeLinker: node-modules\n" > .yarnrc.yml
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Build Windows package
        run: yarn make

      - name: List generated files
        shell: pwsh
        run: |
          Get-ChildItem -Path out/make -Recurse | Select-Object FullName

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wh3mm-windows-${{ steps.meta.outputs.tag }}
          path: out/make/zip/win32/**/*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: out/make/zip/win32/**/*.zip
          fail_on_unmatched_files: true
